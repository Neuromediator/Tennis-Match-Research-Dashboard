# fly.toml app configuration file generated for tennis-research-dashboard on 2026-05-27T21:34:07+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tennis-research-dashboard'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENABLE_SCHEDULER = 'true'
  REFRESH_HOUR_UTC = '21'
  REFRESH_MINUTE_UTC = '0'

[processes]
  app = 'streamlit run src/tennis_predictor/app/main.py'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '5gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/_stcore/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpus = 1
  memory_mb = 2048
  processes = ['app']
