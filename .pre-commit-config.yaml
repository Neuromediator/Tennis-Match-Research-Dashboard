repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the version uv installs (see uv.lock). Drift between
    # pre-commit and `uv run ruff` causes flapping reformat loops — e.g.
    # v0.7.0's "assert (cond), msg" vs v0.15.x's "assert cond, (msg)".
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
